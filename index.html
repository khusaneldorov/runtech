<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTIVITY MONITOR | CYBER DATA SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-black: #050505;
            --panel-bg: #0d0d0d;
            --accent-purple: #bc13fe;
            --accent-blue: #00f2ff;
            --accent-orange: #ff8c00;
            --text-main: #e0e0e0;
            --glow: 0 0 10px rgba(188, 19, 254, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 20px;
            border-bottom: 2px solid var(--accent-purple);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, #0d0d0d 0%, #1a1a1a 100%);
            box-shadow: var(--glow);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--accent-blue);
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 5px 12px;
            border: 1px solid var(--accent-blue);
            border-radius: 4px;
            color: var(--accent-blue);
        }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
        }

        .chart-container {
            background: var(--panel-bg);
            border: 1px solid #333;
            padding: 15px;
            position: relative;
            transition: transform 0.3s ease;
            height: 300px;
        }

        .chart-container:hover {
            border-color: var(--accent-purple);
            box-shadow: var(--glow);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--accent-orange);
        }

        /* Tabs / Months */
        .tabs-container {
            background: #111;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-top: 1px solid #333;
        }

        .tab {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #444;
            color: #888;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            box-shadow: inset 0 0 5px var(--accent-purple);
        }

        /* Offline Overlay */
        #offline-mode {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            color: red;
            font-family: 'Orbitron', sans-serif;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="offline-mode">SYSTEM OFFLINE - CHECK CONNECTION</div>

    <header>
        <h1>Activity Monitor // Data Stream</h1>
        <div id="connection-status" class="status-badge">ONLINE</div>
    </header>

    <main class="dashboard">
        <div class="chart-container">
            <div class="chart-header"><span>01 / CALORIES</span><span id="val-cal">0 kcal</span></div>
            <canvas id="chartCalories"></canvas>
        </div>
        <div class="chart-container">
            <div class="chart-header"><span>02 / DISTANCE</span><span id="val-dist">0 km</span></div>
            <canvas id="chartDistance"></canvas>
        </div>
        <div class="chart-container">
            <div class="chart-header"><span>03 / STEPS</span><span id="val-steps">0 steps</span></div>
            <canvas id="chartSteps"></canvas>
        </div>
        <div class="chart-container">
            <div class="chart-header"><span>04 / FAT BURN</span><span id="val-fat">0 g</span></div>
            <canvas id="chartFat"></canvas>
        </div>
    </main>

    <nav class="tabs-container" id="monthTabs">
        <!-- Вкладки месяцев будут генерироваться здесь -->
    </nav>

    <script>
        const MONTHS_CONFIG = [
            {
                name: 'Март',
                data: [
                    { date: '01.03.2026', calories: 553, distance: 5, steps: 8868,  fat: 72 },
                    { date: '02.03.2026', calories: 544, distance: 7, steps: 13162, fat: 71 },
                    { date: '03.03.2026', calories: 484, distance: 7, steps: 11785, fat: 63 },
                    { date: '04.03.2026', calories: 505, distance: 7, steps: 12311, fat: 66 },
                    { date: '05.03.2026', calories: 401, distance: 5, steps: 9764,  fat: 52 },
                    { date: '06.03.2026', calories: 469, distance: 6, steps: 11396, fat: 61 },
                    { date: '07.03.2026', calories: 506, distance: 7, steps: 12078, fat: 66 },
                    { date: '08.03.2026', calories: 664, distance: 9, steps: 16419, fat: 86 },
                    { date: '09.03.2026', calories: 372, distance: 5, steps: 9000,  fat: 48 },
                    { date: '10.03.2026', calories: 482, distance: 7, steps: 11709, fat: 63 },
                    { date: '11.03.2026', calories: 0,   distance: 0, steps: 2,     fat: 0  },
                    { date: '12.03.2026', calories: 370, distance: 5, steps: 9070,  fat: 48 },
                    { date: '13.03.2026', calories: 585, distance: 8, steps: 14088, fat: 76 },
                    { date: '14.03.2026', calories: 731, distance: 10,steps: 17974, fat: 95 },
                    { date: '15.03.2026', calories: 535, distance: 7, steps: 13068, fat: 70 },
                    { date: '16.03.2026', calories: 586, distance: 8, steps: 142,   fat: 76 },
                    { date: '17.03.2026', calories: 442, distance: 6, steps: 10880, fat: 57 },
                    { date: '18.03.2026', calories: 573, distance: 8, steps: 14025, fat: 74 },
                    { date: '19.03.2026', calories: 568, distance: 8, steps: 13876, fat: 74 },
                    { date: '20.03.2026', calories: 530, distance: 7, steps: 12979, fat: 69 },
                    { date: '21.03.2026', calories: 393, distance: 5, steps: 9645,  fat: 51 },
                    { date: '22.03.2026', calories: 616, distance: 9, steps: 15135, fat: 80 },
                    { date: '23.03.2026', calories: 518, distance: 7, steps: 12684, fat: 67 },
                    { date: '24.03.2026', calories: 363, distance: 5, steps: 8885,  fat: 47 },
                    { date: '25.03.2026', calories: 488, distance: 7, steps: 11880, fat: 63 },
                    { date: '26.03.2026', calories: 375, distance: 5, steps: 9175,  fat: 49 },
                    { date: '27.03.2026', calories: 642, distance: 9, steps: 15680, fat: 83 },
                    { date: '28.03.2026', calories: 463, distance: 6, steps: 11344, fat: 60 },
                    { date: '29.03.2026', calories: 428, distance: 6, steps: 10304, fat: 56 },
                    { date: '30.03.2026', calories: 528, distance: 7, steps: 12887, fat: 69 },
                    { date: '31.03.2026', calories: 577, distance: 8, steps: 14163, fat: 75 },
                ]
            }
        ];

        let currentCharts = {};

        // Настройки графиков
        const chartConfigs = {
            calories: { id: 'chartCalories', color: '#bc13fe', max: 800, label: 'Kcal' },
            distance: { id: 'chartDistance', color: '#00f2ff', max: 10, label: 'Km' },
            steps: { id: 'chartSteps', color: '#ff8c00', max: 18500, label: 'Steps' },
            fat: { id: 'chartFat', color: '#39ff14', max: 100, label: 'Grams' }
        };

        async function init() {
            createTabs();
            window.addEventListener('online', updateStatus);
            window.addEventListener('offline', updateStatus);
            loadMonth(0);
        }

        function createTabs() {
            const container = document.getElementById('monthTabs');
            MONTHS_CONFIG.forEach((m, index) => {
                const btn = document.createElement('button');
                btn.className = `tab ${index === 0 ? 'active' : ''}`;
                btn.innerText = m.name.toUpperCase();
                btn.onclick = (e) => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    loadMonth(index);
                };
                container.appendChild(btn);
            });
        }

        function updateStatus() {
            const status = document.getElementById('connection-status');
            const offlineOverlay = document.getElementById('offline-mode');
            if (navigator.onLine) {
                status.innerText = "ONLINE";
               status.style.borderColor = "#00f2ff";
                offlineOverlay.style.display = 'none';
            } else {
                status.innerText = "OFFLINE";
                status.style.borderColor = "red";
                offlineOverlay.style.display = 'flex';
            }
        }

        async function loadMonth(index) {
            const monthData = MONTHS_CONFIG[index];
            if (monthData) renderCharts(monthData.data);
        }

        function renderCharts(data) {

    if (data.length === 0) {
        return;
    }

   

    function parseDate(str) {
        const parts = str.split('.');
        return new Date(parts[2], parts[1] - 1, parts[0]);
    }

    if (data.length === 0) {
        return;
    }

    const baseDate = parseDate(data[0].date);
    const year = baseDate.getFullYear();
    const month = baseDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    
            
            const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);
            
            const processedData = {
                calories: new Array(daysInMonth).fill(0),
                distance: new Array(daysInMonth).fill(0),
                steps: new Array(daysInMonth).fill(0),
                fat: new Array(daysInMonth).fill(0)
            };

            data.forEach(item => {
              const parsed = parseDate(item.date);
if (isNaN(parsed)) return;

const d = parsed.getDate();
                if (d <= daysInMonth) {
                    processedData.calories[d-1] = item.calories;
                    processedData.distance[d-1] = item.distance;
                    processedData.steps[d-1] = item.steps;
                    processedData.fat[d-1] = item.fat;
                }
            });

            // Обновляем статистику в хедерах (последний день)
            let lastVal = null;

for (let i = data.length - 1; i >= 0; i--) {
    if (data[i] && data[i].calories !== undefined) {
        lastVal = data[i];
        break;
    }
}

if (!lastVal) {
    lastVal = {calories:0, distance:0, steps:0, fat:0};
}
            document.getElementById('val-cal').innerText = `${lastVal.calories} kcal`;
            document.getElementById('val-dist').innerText = `${lastVal.distance} km`;
            document.getElementById('val-steps').innerText = `${lastVal.steps} steps`;
            document.getElementById('val-fat').innerText = `${lastVal.fat} g`;

            // Отрисовка
            Object.keys(chartConfigs).forEach(key => {
                const config = chartConfigs[key];
                createOrUpdateChart(key, config, labels, processedData[key]);
            });
        }

        function createOrUpdateChart(key, config, labels, values) {
            if (currentCharts[key]) {
                currentCharts[key].destroy();
            }

            const ctx = document.getElementById(config.id).getContext('2d');
            currentCharts[key] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: config.label,
                        data: values,
                        borderColor: config.color,
                        backgroundColor: config.color + '22',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: config.max,
                            grid: { color: '#222' },
                            ticks: { color: '#666', font: { family: 'Rajdhani' } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#666', font: { family: 'Rajdhani' } }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    },
                    animation: { duration: 1000 }
                }
            });
        }

        // Запуск системы
        window.onload = init;
    </script>
</body>
</html>
